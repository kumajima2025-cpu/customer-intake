</div>

<div style="height:12px"></div>

<label>特殊照護需求</label>
<textarea id="pet_special_note" placeholder="例如：需定時吃藥、怕雷聲、不能與其他狗接觸等"></textarea>

</div>


<div class="card">

<div class="secTitle">飼主簽名</div>

<div class="sigBox">
<canvas id="sig"></canvas>

<div class="btns">
<button type="button" class="ghost" onclick="clearSig()">清除簽名</button>
</div>
</div>

</div>


<div class="btns">
<button class="primary" type="button">送出資料</button>
</div>

<div class="status" id="status"></div>

<div class="footer">
本資料僅供住宿期間照護參考使用。
</div>


</div>


<script>

const canvas = document.getElementById("sig");
const ctx = canvas.getContext("2d");

let drawing = false;

function resizeCanvas(){
const ratio = window.devicePixelRatio || 1;
const rect = canvas.getBoundingClientRect();

canvas.width = rect.width * ratio;
canvas.height = rect.height * ratio;

ctx.scale(ratio, ratio);
ctx.lineWidth = 2;
ctx.lineCap = "round";
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function start(e){
drawing = true;
draw(e);
}

function end(){
drawing = false;
ctx.beginPath();
}

function draw(e){
if(!drawing) return;

const rect = canvas.getBoundingClientRect();
const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",end);
canvas.addEventListener("touchmove",draw);

function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

</script>
