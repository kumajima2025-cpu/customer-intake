<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>寵物美容服務定型化契約</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap');

:root{
--bg:#FFF7ED;
--card:#FFFFFF;
--border:#E6C9B1;
--text:#2F201B;
--muted:#8B6F61;
--latte:#C35A2E;
--radius:22px;
--radius-sm:16px;
--shadow:0 10px 28px rgba(36,26,22,.08);
}

*{box-sizing:border-box}

body{
margin:0;
background:#F4EFE8;
color:var(--text);
font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.wrap{
max-width:680px;
margin:auto;
padding:18px 14px;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:18px 16px;
margin:14px 0;
border:1px solid rgba(230,201,177,.75);
box-shadow:var(--shadow);
}

.title{
font-size:26px;
font-weight:800;
text-align:center;
margin-bottom:12px;
}

.infoBox{
border:1.6px solid var(--border);
border-radius:var(--radius-sm);
padding:12px;
background:#FFFBF6;
}

.meta{
line-height:1.7;
font-weight:600;
}

.sectionTitle{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

.contractBox{
border:1.6px solid var(--border);
border-radius:var(--radius-sm);
padding:14px;
background:#FFFBF6;
max-height:440px;
overflow:auto;
}

.contractBox pre{
margin:0;
white-space:pre-wrap;
line-height:1.7;
font-size:15px;
}

.input{
width:100%;
border:1.6px solid var(--border);
border-radius:var(--radius-sm);
padding:14px;
font-size:16px;
background:#FFFBF6;
margin-bottom:10px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.choiceRow{
display:flex;
gap:14px;
padding:10px;
border:1px solid var(--border);
border-radius:16px;
background:#FFFBF6;
}

.choice{
display:flex;
gap:6px;
align-items:center;
font-weight:700;
}

.checkRow{
display:flex;
gap:12px;
margin-top:14px;
padding:12px;
border-radius:16px;
background:#FFF3E8;
border:1px solid var(--border);
}

.checkRow input{
width:22px;
height:22px;
accent-color:var(--latte);
}

#sig{
width:100%;
height:240px;
border:1.6px solid var(--border);
border-radius:var(--radius-sm);
background:#fff;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:14px;
font-size:17px;
font-weight:900;
margin-top:10px;
background:#C35A2E;
color:white;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">寵物美容服務定型化契約</div>

<div class="infoBox">
<div class="meta">
公司名稱：OO寵物沙龍<br>
營業地址：台北市XX區XX路XX號<br>
官方LINE：@abc123
</div>
</div>

</div>

<div class="card">

<div class="sectionTitle">契約內容</div>

<div class="contractBox">
<pre>

（此處放完整定型化契約內容）

</pre>
</div>

<div class="checkRow">
<input type="checkbox" checked>
<label>我已完整閱讀並同意上述契約內容</label>
</div>

</div>

<div class="card">

<div class="sectionTitle">基本資料表</div>

<input class="input" value="王小明">
<input class="input" value="A123456789">
<input class="input" value="0912-345-678">

<div class="grid2">
<input class="input" value="王媽媽">
<input class="input" value="0988-111-222">
</div>

<input class="input" value="demo@example.com">
<input class="input" value="新北市XX區XX路123號">

<input class="input" value="LISA">
<input class="input" value="比熊犬">

<div class="grid2">
<input class="input" value="3">
<input class="input" value="2021/05/18">
</div>

</div>

<div class="card">

<div class="sectionTitle">簽名</div>

<canvas id="sig"></canvas>

<button class="btn">確認簽署</button>

</div>

</div>

<script>

const canvas=document.getElementById("sig");
const ctx=canvas.getContext("2d");

function resize(){
const r=canvas.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
canvas.width=r.width*dpr;
canvas.height=r.height*dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);
ctx.lineWidth=4;
ctx.lineCap="round";
}

resize();
window.addEventListener("resize",resize);

let drawing=false;

canvas.addEventListener("pointerdown",e=>{
drawing=true;
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
});

canvas.addEventListener("pointermove",e=>{
if(!drawing)return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

canvas.addEventListener("pointerup",()=>drawing=false);
canvas.addEventListener("pointerleave",()=>drawing=false);

</script>

</body>
</html>
