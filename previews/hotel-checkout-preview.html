
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OO寵物 ABC123｜住宿明細確認</title>

<style>
:root{
--bg:#F6F1E9;
--card:#ffffff;
--line:#E3D8C8;
--title:#EDE6DA;
--text:#3C3A36;
--muted:#7B746B;
--btn:#2f2d2a;
}

html,body{
width:100%;
max-width:100%;
overflow-x:hidden;
}

*{box-sizing:border-box}
img,canvas{max-width:100%;display:block}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
}

/* ===== PREVIEW HEADER ===== */

.previewHeader{
text-align:center;
margin-bottom:18px;
}

.previewTag{
display:inline-block;
padding:4px 10px;
border:1px solid #C35A2E;
border-radius:999px;
font-size:12px;
font-weight:700;
color:#C35A2E;
margin-bottom:10px;
}

.logoCircle{
width:72px;
height:72px;
border-radius:50%;
border:2px solid #E3D8C8;
display:flex;
align-items:center;
justify-content:center;
margin:8px auto;
font-weight:800;
color:#C35A2E;
}

.brand{
text-align:center;
font-weight:800;
letter-spacing:1px;
margin-top:6px;
}

/* ===== PAGE ===== */

.wrap{
width:100%;
max-width:900px;
margin:0 auto;
padding:18px;
}

.barTitle{
background:var(--btn);
color:#fff;
text-align:center;
padding:12px 14px;
border-radius:14px;
font-weight:800;
letter-spacing:3px;
}

.hint{
color:var(--muted);
font-size:13px;
line-height:1.5;
margin:10px 0 14px;
}

.modeTag{
display:inline-block;
padding:6px 10px;
border-radius:999px;
border:1px solid var(--line);
background:#fff;
font-size:12px;
color:var(--muted);
margin:10px 0 0;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:18px;
overflow:hidden;
margin:12px 0;
}

.cardTitle{
background:var(--title);
padding:12px 14px;
font-weight:800;
}

.cardBody{
padding:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

@media(max-width:760px){
.grid{grid-template-columns:1fr;}
}

label{
display:block;
font-size:13px;
margin:2px 0 6px;
color:var(--muted);
}

input,textarea,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid var(--line);
background:#fff;
font-size:16px;
color:var(--text);
}

textarea{
min-height:86px;
resize:vertical;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

button{
padding:11px 14px;
border:0;
border-radius:14px;
cursor:pointer;
font-size:15px;
background:var(--btn);
color:#fff;
}

.ghost{
background:#fff;
border:1px solid var(--line);
color:var(--text);
}

.small{
font-size:12px;
color:var(--muted);
line-height:1.5;
}

.sigBox{
background:#fff;
border:1px dashed #cdbfae;
border-radius:12px;
padding:10px;
}

canvas{
width:100%;
height:180px;
border:1px solid var(--line);
border-radius:12px;
}

.status{
margin-top:10px;
font-size:14px;
}

.ok{color:#1b7f3a;}
.bad{color:#b00020;}

</style>
</head>

<body>

<div class="wrap">

<!-- PREVIEW HEADER -->

<div class="previewHeader">

<div class="previewTag">PREVIEW</div>

<div class="logoCircle">LOGO</div>

<div class="brand">OO寵物 ABC123</div>

</div>

<div class="barTitle">— 住宿明細確認 —</div>
<div class="hint">住宿期間紀錄與費用確認</div>
<div class="modeTag">MODE: 預覽</div>

<div class="card">
<div class="cardTitle">基本資訊</div>
<div class="cardBody">

<div class="grid">

<div>
<label>飼主姓名</label>
<input placeholder="例：陳小美">
</div>

<div>
<label>寵物名字</label>
<input placeholder="例：Lucky">
</div>

<div>
<label>住宿日期</label>
<input placeholder="2026/03/18~2026/03/20">
</div>

</div>

</div>
</div>

<div class="card">
<div class="cardTitle">活動紀錄</div>
<div class="cardBody">

<label>日期</label>
<input placeholder="2026/03/18">

<label>日常紀錄</label>
<textarea placeholder="例：食慾正常、排便正常、情緒穩定"></textarea>

</div>
</div>

<div class="card">
<div class="cardTitle">照顧細節</div>
<div class="cardBody">

<label>生活習慣</label>
<textarea placeholder="例：怕生、喜歡被摸頭"></textarea>

<label>照顧須知</label>
<textarea placeholder="例：需要慢慢親近"></textarea>

</div>
</div>

<div class="card">
<div class="cardTitle">費用明細</div>
<div class="cardBody">

<div class="grid3">

<div>
<label>項目</label>
<input placeholder="住宿費">
</div>

<div>
<label>單價</label>
<input placeholder="1000">
</div>

<div>
<label>數量</label>
<input placeholder="2">
</div>

</div>

<div style="margin-top:12px;font-weight:800;">
總金額：$2000
</div>

</div>
</div>

<div class="card">
<div class="cardTitle">飼主確認與簽名</div>
<div class="cardBody">

<label>Email</label>
<input placeholder="you@example.com">

<div class="sigBox">
<div class="small">請在下方簽名</div>
<canvas></canvas>
</div>

<div class="btns">
<button>送出並寄送 PDF</button>
</div>

</div>
</div>

</div>

</body>
</html>
